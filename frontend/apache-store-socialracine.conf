# Apache — store.socialracine.com → Vite dev (127.0.0.1:5176)
# Modules requis : proxy proxy_http proxy_wstunnel
#
# Installation :
#   sudo cp frontend/apache-store-socialracine.conf /etc/apache2/sites-available/tirips-le-ssl.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName store.socialracine.com

    ProxyPreserveHost On
    ProxyRequests Off

    # HTTP + WebSocket Vite HMR (évite le double ProxyPass + Rewrite qui bloque parfois le WS)
    ProxyPass / http://127.0.0.1:5176/ upgrade=websocket
    ProxyPassReverse / http://127.0.0.1:5176/

    ErrorLog ${APACHE_LOG_DIR}/store.socialracine.com-error.log
    CustomLog ${APACHE_LOG_DIR}/store.socialracine.com-access.log combined
    SSLCertificateFile /etc/letsencrypt/live/store.socialracine.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/store.socialracine.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
