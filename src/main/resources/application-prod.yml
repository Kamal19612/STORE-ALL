# Profil production — activer avec : SPRING_PROFILES_ACTIVE=prod
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

server:
  shutdown: graceful

app:
  jwt:
    secret: ${JWT_SECRET}
  bootstrap:
    reset-admin-password-on-each-start: false
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS}
  rate-limit:
    enabled: true

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework.web: INFO
