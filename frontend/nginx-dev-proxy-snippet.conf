# Reverse-proxy nginx : https://store.socialracine.com → Vite dev (127.0.0.1:5176)
# Inclure dans le server { } HTTPS du domaine store.socialracine.com
#
# Le WebSocket HMR Vite DOIT être relayé (sinon erreur wss://...:5176 timeout).

location / {
    proxy_pass http://127.0.0.1:5176;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket HMR Vite
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
}
